apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.1.0
          ports:
            - containerPort: 3000
          env:
            # Disable login for local dev (anonymous access with admin role)
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: "Admin"
            - name: GF_AUTH_DISABLE_LOGIN_FORM
              value: "true"
          volumeMounts:
            # Datasource provisioning
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            # Dashboard provider config
            - name: dashboard-providers
              mountPath: /etc/grafana/provisioning/dashboards
            # Dashboard JSON files
            - name: dashboard-k8s
              mountPath: /var/lib/grafana/dashboards/k8s
            - name: dashboard-mysql
              mountPath: /var/lib/grafana/dashboards/mysql
            - name: dashboard-redis
              mountPath: /var/lib/grafana/dashboards/redis
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-providers
          configMap:
            name: grafana-dashboard-providers
        - name: dashboard-k8s
          configMap:
            name: grafana-dashboard-k8s
        - name: dashboard-mysql
          configMap:
            name: grafana-dashboard-mysql
        - name: dashboard-redis
          configMap:
            name: grafana-dashboard-redis
