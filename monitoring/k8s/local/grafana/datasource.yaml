# This ConfigMap is mounted into Grafana's provisioning/datasources directory.
# On startup, Grafana reads this file and auto-registers Prometheus as the default
# datasource — no manual configuration needed in the UI.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.monitoring.svc.cluster.local:9090
        isDefault: true
        editable: false
