apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-redis
  namespace: monitoring
data:
  redis-overview.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "Redis Up",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "1": { "text": "UP", "color": "green" }, "0": { "text": "DOWN", "color": "red" } } }
              ],
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "redis_up",
              "legendFormat": "{{addr}}"
            }
          ]
        },
        {
          "title": "Connected Clients",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 50 },
                  { "color": "red", "value": 100 }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "sum(redis_connected_clients)",
              "legendFormat": "Clients"
            }
          ]
        },
        {
          "title": "Memory Used",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "unit": "bytes",
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 104857600 },
                  { "color": "red", "value": 268435456 }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "sum(redis_memory_used_bytes)",
              "legendFormat": "Used"
            }
          ]
        },
        {
          "title": "Cache Hit Rate",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "unit": "percentunit",
              "thresholds": {
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "orange", "value": 0.8 },
                  { "color": "green", "value": 0.95 }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "sum(redis_keyspace_hits_total) / (sum(redis_keyspace_hits_total) + sum(redis_keyspace_misses_total))",
              "legendFormat": "Hit Rate"
            }
          ]
        },
        {
          "title": "Hit/Miss Rate Over Time",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2, "fillOpacity": 10 },
              "unit": "ops"
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "sum(rate(redis_keyspace_hits_total[5m]))",
              "legendFormat": "Hits/s"
            },
            {
              "expr": "sum(rate(redis_keyspace_misses_total[5m]))",
              "legendFormat": "Misses/s"
            }
          ]
        },
        {
          "title": "Memory Usage Over Time",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2, "fillOpacity": 10 },
              "unit": "bytes"
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "redis_memory_used_bytes",
              "legendFormat": "{{addr}} used"
            },
            {
              "expr": "redis_memory_max_bytes > 0",
              "legendFormat": "{{addr}} max"
            }
          ]
        },
        {
          "title": "Commands Per Second",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2, "fillOpacity": 10 },
              "unit": "ops"
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "sum(rate(redis_commands_processed_total[5m]))",
              "legendFormat": "Commands/s"
            }
          ]
        },
        {
          "title": "Keys by Database",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2, "fillOpacity": 10 }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "redis_db_keys",
              "legendFormat": "{{addr}} {{db}}"
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "title": "Redis Overview",
      "uid": "redis-overview",
      "version": 1,
      "time": { "from": "now-1h", "to": "now" },
      "refresh": "30s"
    }
