name: Terraform Deploy

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"

jobs:
  # ─────────────────────────────────────────────
  # Deploy AWS infrastructure
  # ─────────────────────────────────────────────
  deploy-aws:
    name: Deploy AWS Infrastructure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: "us-east-1"

      - name: Terraform Init
        working-directory: terraform/aws
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_BACKEND_BUCKET }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_BACKEND_DYNAMODB_TABLE }}" \
            -backend-config="region=us-east-1"

      - name: Terraform Apply
        working-directory: terraform/aws
        env:
          TF_VAR_app_key: ${{ secrets.APP_KEY }}
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
          TF_VAR_gateway_db_password: ${{ secrets.DB_PASSWORD_GATEWAY }}
          TF_VAR_abonnement_db_password: ${{ secrets.DB_PASSWORD_ABONNEMENT }}
          TF_VAR_mysql_root_password: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          TF_VAR_dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          TF_VAR_user_service_db_password: ${{ secrets.DB_PASSWORD_USER_SERVICE }}
        run: terraform apply -auto-approve

      - name: Terraform Init (k8s apps)
        working-directory: terraform/aws-k8s
        run: terraform init

      - name: Terraform Apply (k8s apps)
        working-directory: terraform/aws-k8s
        env:
          TF_VAR_app_key: ${{ secrets.APP_KEY }}
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
          TF_VAR_gateway_db_password: ${{ secrets.DB_PASSWORD_GATEWAY }}
          TF_VAR_abonnement_db_password: ${{ secrets.DB_PASSWORD_ABONNEMENT }}
          TF_VAR_mysql_root_password: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          TF_VAR_dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          TF_VAR_user_service_db_password: ${{ secrets.DB_PASSWORD_USER_SERVICE }}
        run: terraform apply -auto-approve

  # ─────────────────────────────────────────────
  # Deploy Azure infrastructure
  # ─────────────────────────────────────────────
  deploy-azure:
    name: Deploy Azure Infrastructure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform Init
        working-directory: terraform/azure
        env:
          ARM_CLIENT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}
          ARM_CLIENT_SECRET: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}
          ARM_SUBSCRIPTION_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}
          ARM_TENANT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_BACKEND_AZURE_RG }}" \
            -backend-config="storage_account_name=${{ secrets.TF_BACKEND_AZURE_SA }}" \
            -backend-config="container_name=${{ secrets.TF_BACKEND_AZURE_CONTAINER }}"

      - name: Terraform Apply
        working-directory: terraform/azure
        env:
          ARM_CLIENT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}
          ARM_CLIENT_SECRET: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}
          ARM_SUBSCRIPTION_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}
          ARM_TENANT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}
          TF_VAR_app_key: ${{ secrets.APP_KEY }}
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
          TF_VAR_gateway_db_password: ${{ secrets.DB_PASSWORD_GATEWAY }}
          TF_VAR_abonnement_db_password: ${{ secrets.DB_PASSWORD_ABONNEMENT }}
          TF_VAR_mysql_root_password: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          TF_VAR_dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          TF_VAR_user_service_db_password: ${{ secrets.DB_PASSWORD_USER_SERVICE }}
        run: terraform apply -auto-approve
